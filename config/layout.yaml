# ============================================================
# DataBoard - Dashboard 布局配置
# ============================================================

title: "系统监控看板"
refresh_interval: 5

layout:
  # ── 第 1 行：RPi 概览 ────────────────────
  - row: "树莓派系统"
    panels:
      - metric: rpi_cpu_temp
        width: 2
        height: 1
      - metric: rpi_mem_usage
        width: 1
        height: 1
      - metric: rpi_cpu_load
        width: 1
        height: 1

  # ── 第 2 行：RPi 存储 + 磁盘 ─────────────
  - row: "存储 & 状态"
    panels:
      - metric: rpi_disk_usage
        width: 1
        height: 1
        title: "RPi 磁盘"
      - metric: rpi_cpu_temp
        width: 1
        height: 1
        title: "实时温度"
      - metric: owrt_cpu_temp
        width: 1
        height: 1
        title: "OpenWrt 温度"
      - metric: owrt_mem_usage
        width: 1
        height: 1
        title: "OpenWrt 内存"

  # ── 第 3 行：OpenWrt 概览 ────────────────
  - row: "OpenWrt 系统"
    panels:
      - metric: owrt_cpu_load
        width: 1
        height: 1
        title: "CPU 负载"
      - metric: owrt_cpu_temp
        width: 1
        height: 1
        title: "CPU 温度"
      - metric: owrt_mem_usage
        width: 2
        height: 1
        title: "内存使用率"

  # ── 第 4 行：网络流量 ────────────────────
  - row: "网络流量"
    panels:
      - metric: owrt_net_rx
        width: 2
        height: 1
        title: "WAN 下载"
      - metric: owrt_net_tx
        width: 2
        height: 1
        title: "WAN 上传"

  # ── 第 5 行：LAN 流量 ────────────────────
  - row: "内网流量"
    panels:
      - metric: owrt_lan_rx
        width: 2
        height: 1
        title: "LAN 接收"
      - metric: owrt_lan_tx
        width: 2
        height: 1
        title: "LAN 发送"
