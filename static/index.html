<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBoard — 系统监控看板</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@4"></script>
</head>
<body>
<div class="app">
    <header class="header">
        <h1 class="title" id="page-title">系统监控看板</h1>
        <div class="header-meta">
            <span class="badge" id="conn-status">● 已连接</span>
            <span class="badge badge-secondary" id="data-source">数据源: 实时</span>
            <span class="badge badge-secondary" id="last-update">--</span>
        </div>
    </header>
    <main class="dashboard" id="dashboard"></main>
</div>
<script src="/static/dashboard.js"></script>
</body>
</html>
