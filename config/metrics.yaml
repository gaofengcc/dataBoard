# ============================================================
# DataBoard - 指标定义配置
# ============================================================

metrics:
  # ── 树莓派：状态卡片（纯数字/文字展示） ──────────
  - id: rpi_ip_info
    name: "IP 地址"
    unit: ""
    chart_type: stat
    color: "#36a2eb"
    refresh_interval: 10
    query: 'rpi_ip_info{host="gaofengpi"}'
    # stat 类型在 value 位置显示标签值
    label_key: "ip"

  - id: rpi_uptime
    name: "运行时间"
    unit: ""
    chart_type: stat
    color: "#00e396"
    refresh_interval: 10
    query: 'rpi_uptime_seconds{host="gaofengpi"}'
    stat_format: "uptime"    # 自动格式化为 Xd XXh XXm

  - id: rpi_fan_speed
    name: "风扇转速"
    unit: "RPM"
    chart_type: line
    color: "#9966ff"
    refresh_interval: 10
    query: 'rpi_fan_speed{host="gaofengpi"}'
    mock:
      min: 0
      max: 8000
      drift: 5

  - id: rpi_docker_status
    name: "Docker"
    unit: ""
    chart_type: stat
    color: "#4bc0c0"
    refresh_interval: 10
    query: 'rpi_docker_running{host="gaofengpi"}'
    stat_format: "fraction"
    stat_total_query: 'rpi_docker_total{host="gaofengpi"}'

  - id: rpi_disk_stat
    name: "磁盘使用"
    unit: "GB"
    chart_type: stat
    color: "#ff9f40"
    refresh_interval: 10
    query: 'rpi_disk_used_gb{host="gaofengpi"}'
    stat_format: "disk"

  # 隐藏指标：用于磁盘 stat 卡组合展示
  - id: __rpi_disk_total
    name: ""
    chart_type: _hidden
    refresh_interval: 10
    query: 'rpi_disk_total_gb{host="gaofengpi"}'

  # 隐藏指标：Docker 磁盘占用
  - id: __rpi_docker_disk
    name: ""
    chart_type: _hidden
    refresh_interval: 10
    query: 'rpi_docker_disk_bytes{host="gaofengpi"}'

  # ── 树莓派：曲线图表 ────────────────────────
  - id: rpi_cpu_temp
    name: "CPU 温度"
    unit: "°C"
    chart_type: line
    color: "#ff6384"
    refresh_interval: 10
    query: 'rpi_cpu_temp{host="gaofengpi"}'
    mock:
      min: 40
      max: 75
      drift: 0.3

  - id: rpi_mem_usage
    name: "内存使用"
    unit: "%"
    chart_type: area
    color: "#36a2eb"
    refresh_interval: 10
    query: 'rpi_mem_usage_pct{host="gaofengpi"}'
    mock:
      min: 30
      max: 85
      drift: 0.5

  - id: rpi_cpu_load
    name: "CPU 负载"
    unit: ""
    chart_type: line
    color: "#ffce56"
    refresh_interval: 10
    query: 'rpi_load1{host="gaofengpi"}'
    mock:
      min: 0.2
      max: 4.0
      drift: 0.1

  - id: rpi_net_speed
    name: "网速"
    unit: "KB/s"
    chart_type: line
    color: "#00e396"
    refresh_interval: 10
    # 用 rate() 算每秒字节数，/1024 转 KB/s
    query: 'rate(rpi_net_rx_bytes{host="gaofengpi"}[2m]) / 1024'

  # ── OpenWrt 系统 ──────────────────────────
  - id: owrt_cpu_load
    name: "CPU"
    unit: ""
    chart_type: line
    color: "#9966ff"
    refresh_interval: 5
    query: 'owrt_load1{host="r66s"}'
    mock:
      min: 0.1
      max: 3.0
      drift: 0.2

  - id: owrt_mem_usage
    name: "内存"
    unit: "%"
    chart_type: area
    color: "#4bc0c0"
    refresh_interval: 5
    query: 'owrt_mem_usage_pct{host="r66s"}'
    mock:
      min: 10
      max: 50
      drift: 0.3

  - id: owrt_cpu_temp
    name: "温度"
    unit: "°C"
    chart_type: line
    color: "#ff6384"
    refresh_interval: 5
    query: 'owrt_cpu_temp{host="r66s"}'
    mock:
      min: 40
      max: 70
      drift: 0.2

  # ── 网络流量 ──────────────────────────────
  - id: owrt_net_rx
    name: "WAN 下载"
    unit: "MB/s"
    chart_type: line
    color: "#00e396"
    refresh_interval: 5
    query: 'rate(owrt_wan_rx_bytes{host="r66s"}[1m]) / 1048576'
    adaptive_unit: true
    mock:
      min: 0
      max: 10
      drift: 1.0

  - id: owrt_net_tx
    name: "WAN 上传"
    unit: "MB/s"
    chart_type: line
    color: "#feb019"
    refresh_interval: 5
    query: 'rate(owrt_wan_tx_bytes{host="r66s"}[1m]) / 1048576'
    adaptive_unit: true
    mock:
      min: 0
      max: 5
      drift: 0.5

  - id: owrt_lan_rx
    name: "LAN 接收"
    unit: "MB/s"
    chart_type: line
    color: "#36a2eb"
    refresh_interval: 5
    query: 'rate(owrt_lan_rx_bytes{host="r66s"}[1m]) / 1048576'
    adaptive_unit: true
    mock:
      min: 0
      max: 50
      drift: 2.0

  - id: owrt_lan_tx
    name: "LAN 发送"
    unit: "MB/s"
    chart_type: line
    color: "#ff9f40"
    refresh_interval: 5
    query: 'rate(owrt_lan_tx_bytes{host="r66s"}[1m]) / 1048576'
    adaptive_unit: true
    mock:
      min: 0
      max: 30
      drift: 1.0

  # ── OpenWrt 新增指标 ─────────────────────
  - id: owrt_cpu_freq
    name: "CPU 频率"
    unit: "MHz"
    chart_type: stat
    color: "#00e396"
    refresh_interval: 30
    query: 'owrt_cpu_freq{host="r66s"}'

  - id: owrt_processes
    name: "进程数"
    unit: ""
    chart_type: stat
    color: "#36a2eb"
    refresh_interval: 30
    query: 'owrt_process_count{host="r66s"}'

  - id: owrt_conntrack
    name: "连接数"
    unit: ""
    chart_type: line
    color: "#ff6384"
    refresh_interval: 5
    query: 'owrt_conntrack_count{host="r66s"}'

  - id: owrt_overlay_stat
    name: "系统磁盘"
    unit: "GB"
    chart_type: stat
    color: "#ff9f40"
    refresh_interval: 30
    query: 'owrt_overlay_used_gb{host="r66s"}'
    stat_format: "disk"

  - id: __owrt_overlay_total
    name: ""
    chart_type: _hidden
    refresh_interval: 30
    query: 'owrt_overlay_total_gb{host="r66s"}'

  - id: owrt_usb_stat
    name: "USB 硬盘"
    unit: "GB"
    chart_type: stat
    color: "#4bc0c0"
    refresh_interval: 30
    query: 'owrt_usb_used_gb{host="r66s"}'
    stat_format: "disk"

  - id: __owrt_usb_total
    name: ""
    chart_type: _hidden
    refresh_interval: 30
    query: 'owrt_usb_total_gb{host="r66s"}'

  # ── OpenWrt 网口状态 ────────────────────
  - id: owrt_wan_port
    name: "WAN 口"
    unit: ""
    chart_type: stat
    color: "#00e396"
    refresh_interval: 30
    query: 'owrt_iface_eth0{host="r66s"}'
    stat_format: "iface"

  - id: owrt_lan_port
    name: "LAN 口"
    unit: ""
    chart_type: stat
    color: "#36a2eb"
    refresh_interval: 30
    query: 'owrt_iface_eth1{host="r66s"}'
    stat_format: "iface"

  # ── OpenWrt 系统信息 ────────────────────
  - id: owrt_uptime
    name: "运行时间"
    unit: ""
    chart_type: stat
    color: "#00e396"
    refresh_interval: 30
    query: 'owrt_uptime_seconds{host="r66s"}'
    stat_format: "uptime"

  - id: owrt_devices
    name: "已连接设备"
    unit: ""
    chart_type: stat
    color: "#36a2eb"
    refresh_interval: 30
    query: 'owrt_device_count{host="r66s"}'

  - id: owrt_ip_info
    name: "IP 地址"
    unit: ""
    chart_type: stat
    color: "#4bc0c0"
    refresh_interval: 30
    query: 'owrt_ip_info{host="r66s"}'
    label_key: "ip"

  - id: owrt_version
    name: "系统版本"
    unit: ""
    chart_type: stat
    color: "#9966ff"
    refresh_interval: 60
    query: 'owrt_version{host="r66s"}'
    label_key: "version"

  # ── 组合卡片 ────────────────────────────
  - id: owrt_system_info
    name: "系统信息"
    unit: ""
    chart_type: stat
    color: "#4bc0c0"
    refresh_interval: 30
    query: 'owrt_system_info{host="r66s"}'
    label_key: "ip"

  - id: owrt_system_status
    name: "运行状态"
    unit: ""
    chart_type: stat
    color: "#00e396"
    refresh_interval: 10
    query: 'owrt_system_status{host="r66s"}'
    stat_format: "uptime"

  - id: owrt_cpu_status
    name: "CPU"
    unit: ""
    chart_type: stat
    color: "#9966ff"
    refresh_interval: 10
    query: 'owrt_cpu_status{host="r66s"}'
    stat_format: "cpu_status"

  - id: owrt_net_ports
    name: "网口"
    unit: ""
    chart_type: stat
    color: "#36a2eb"
    refresh_interval: 30
    query: 'owrt_net_ports{host="r66s"}'
    stat_format: "port_pair"

  # ── HA 设备 ───────────────────────────────
  - id: ha_temperature
    name: "温度"
    unit: "°C"
    chart_type: multi_line
    color: "#ff6384"
    refresh_interval: 10
    query: 'ha_temp'
    split_by: "room"

  - id: ha_humidity
    name: "湿度"
    unit: "%"
    chart_type: multi_line
    color: "#36a2eb"
    refresh_interval: 10
    query: 'ha_hum'
    split_by: "room"

  - id: ha_formaldehyde
    name: "甲醛"
    unit: "mg/m³"
    chart_type: line
    color: "#9966ff"
    refresh_interval: 10
    query: 'ha_hcho'
