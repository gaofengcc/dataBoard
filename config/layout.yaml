# ============================================================
# DataBoard - Dashboard 布局配置
# ============================================================

title: "系统监控看板"
refresh_interval: 10

layout:
  # ── 树莓派系统（核心看板，默认展开） ──────────
  - row: "树莓派系统"
    collapsed: false
    panels:
      # 第 1 排：状态卡片（4 格）
      - metric: rpi_ip_info
        width: 1
        height: 1
      - metric: rpi_uptime
        width: 1
        height: 1
      - metric: rpi_disk_stat
        width: 1
        height: 1
      - metric: rpi_docker_status
        width: 1
        height: 1
      # 第 2 排：曲线图表（4 格）
      - metric: rpi_cpu_temp
        width: 2
        height: 1
      - metric: rpi_mem_usage
        width: 1
        height: 1
      - metric: rpi_cpu_load
        width: 1
        height: 1
      # 第 3 排：风扇 + 网速（2 格）
      - metric: rpi_fan_speed
        width: 2
        height: 1
      - metric: rpi_net_speed
        width: 2
        height: 1

  # ── OpenWrt 系统 ─────────────────────────
  - row: "OpenWrt 系统"
    collapsed: true
    panels:
      # 状态卡片（上面）
      - metric: owrt_system_info
        width: 2
        height: 1
      - metric: owrt_system_status
        width: 2
        height: 1
      - metric: owrt_cpu_status
        width: 2
        height: 1
      - metric: owrt_net_ports
        width: 2
        height: 1
      - metric: owrt_overlay_stat
        width: 2
        height: 1
      - metric: owrt_usb_stat
        width: 2
        height: 1
      # 曲线图表（下面）
      - metric: owrt_cpu_load
        width: 1
        height: 1
      - metric: owrt_cpu_temp
        width: 1
        height: 1
      - metric: owrt_mem_usage
        width: 2
        height: 1
      - metric: owrt_conntrack
        width: 2
        height: 1
      # WAN 流量
      - metric: owrt_net_rx
        width: 2
        height: 1
      - metric: owrt_net_tx
        width: 2
        height: 1
      # LAN 流量
      - metric: owrt_lan_rx
        width: 2
        height: 1
      - metric: owrt_lan_tx
        width: 2
        height: 1

  # ── HA 设备 ──
  - row: "HA 环境监测"
    collapsed: true
    panels:
      - metric: ha_temperature
        width: 2
        height: 1.5
      - metric: ha_humidity
        width: 2
        height: 1.5
      - metric: ha_formaldehyde
        width: 2
        height: 1

  - row: "HA 门窗 & 人体"
    collapsed: true
    panels:
      - metric: ha_door_presence
        width: 4
        height: 1.5

  - row: "HA 空调 & 功耗"
    collapsed: true
    panels:
      - metric: ha_ac_status
        width: 2
        height: 1.5
      - metric: ha_power_chart
        width: 2
        height: 1.5

  - row: "HA 电池健康"
    collapsed: true
    panels:
      - metric: ha_battery_bar
        width: 4
        height: 1.5

  - row: "HA 其它设备"
    collapsed: true
    panels:
      - metric: ha_vacuum_gauge
        width: 1
        height: 1
      - metric: ha_cover_gauge
        width: 1
        height: 1
      - metric: ha_tracker_gauge
        width: 1
        height: 1
